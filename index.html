    <style>
        :root {
            --pure-black: #000000;
            --card-bg: #0a0a0a;
            --gold: #D4AF37;
            --bright-gold: #FFD700;
            --audio-color: #f39c12;
            --border: rgba(212, 175, 55, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--pure-black);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at center, #1a1500 0%, #000 100%);
        }

        /* Top Bar Credit */
        .top-nav {
            width: 100%;
            padding: 15px;
            text-align: center;
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--gold);
            color: var(--gold);
            font-weight: 800;
            letter-spacing: 4px;
            font-size: 12px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .app-container {
            width: 92%;
            max-width: 650px;
            padding-top: 30px;
        }

        .app-logo {
            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }

        .sub-text {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Professional Search Bar */
        .search-wrapper {
            background: #111;
            border: 2px solid var(--gold);
            border-radius: 50px;
            display: flex;
            padding: 5px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .search-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 0 20px;
            font-size: 1rem;
        }

        .btn-extract {
            background: linear-gradient(45deg, var(--gold), var(--bright-gold));
            color: black;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 0 15px var(--gold);
        }

        .btn-extract:hover { transform: rotate(360deg) scale(1.1); }

        /* Loader */
        .loader {
            display: none;
            margin: 20px auto;
            border: 3px solid #222;
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            width: 45px; height: 45px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Result Section */
        #download-card {
            background: var(--card-bg);
            border-radius: 25px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: none;
            animation: fadeIn 0.8s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-bottom: 50px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        #video-thumb { 
            width: 100%; 
            border-bottom: 3px solid var(--gold);
            display: block; 
            max-height: 300px;
            object-fit: cover;
        }

        .video-meta { padding: 20px; text-align: center; background: #000; }
        #v-title { font-weight: 500; color: var(--gold); font-size: 1rem; line-height: 1.4; }

        /* SEPARATION GRID */
        .button-hub {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            padding: 25px 15px;
            background: #050505;
            align-items: flex-start;
        }

        .separation-line {
            width: 2px;
            height: 250px;
            background: rgba(255, 255, 255, 0.8);
            margin: 0 5px;
            box-shadow: 0 0 10px white;
        }

        .hub-col { display: flex; flex-direction: column; gap: 10px; }
        .col-tag { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 15px; 
            text-align: center;
            font-weight: 800;
        }

        /* Quality Buttons */
        .dl-action-btn {
            text-decoration: none;
            padding: 12px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        /* Video Buttons (Gold) */
        .btn-v { color: var(--gold); background: rgba(212, 175, 55, 0.05); border-color: var(--gold); }
        .btn-v:hover { background: var(--gold); color: black; transform: translateX(5px); }

        /* Audio Buttons (Silver/White) */
        .btn-a { color: #fff; background: rgba(255,255,255,0.05); border-color: #fff; }
        .btn-a:hover { background: #fff; color: black; transform: translateX(-5px); }

        /* Floating WhatsApp */
        .wa-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px; height: 65px;
            background: #25d366;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 32px;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
            z-index: 1000;
            transition: 0.3s;
        }
        .wa-btn:hover { transform: scale(1.1); }

        .footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            color: #555;
            font-size: 12px;
            letter-spacing: 4px;
            border-top: 1px solid #111;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="top-nav">OFFICIAL PREMIUM BY AHMAD ALI</div>

    <div class="app-container">
        <h1 class="app-logo">AHMAD RDX</h1>
        <p class="sub-text">ALL SOCIAL MEDIA VIDEO DOWNLOADER</p>
        
        <div class="search-wrapper">
            <input type="text" id="userInput" placeholder="Paste link here (YT, FB, Insta, TikTok...)">
            <button class="btn-extract" onclick="fetchData()"><i class="fas fa-search"></i></button>
        </div>

        <div class="loader" id="loader"></div>

        <div id="download-card">
            <img src="" id="video-thumb">
            <div class="video-meta">
                <div id="v-title">Video Details Loading...</div>
            </div>

            <div class="button-hub">
                <div class="hub-col">
                    <div class="col-tag" style="color:var(--gold)">MP4 VIDEO</div>
                    <div onclick="directDownload('1080p')" class="dl-action-btn btn-v"><i class="fas fa-crown"></i> 1080p HD</div>
                    <div onclick="directDownload('720p')" class="dl-action-btn btn-v"><i class="fas fa-video"></i> 720p HD</div>
                    <div onclick="directDownload('480p')" class="dl-action-btn btn-v"><i class="fas fa-play"></i> 480p</div>
                    <div onclick="directDownload('360p')" class="dl-action-btn btn-v"><i class="fas fa-mobile-alt"></i> 360p</div>

                </div>

                    <div onclick="directDownload('mp3_mq')" class="dl-action-btn btn-a"><i class="fas fa-headphones"></i> 192kbps</div>
                    <div onclick="directDownload('mp3_lq')" class="dl-action-btn btn-a"><i class="fas fa-volume-down"></i> 128kbps</div>
                </div>
            </div>
        </div>
    </div>

    <a href="https://wa.me/923068796622" class="wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let currentData = { mp4: '', mp3: '', title: '' };

        async function fetchData() {
            const url = document.getElementById('userInput').value;
            const card = document.getElementById('download-card');
            const loader = document.getElementById('loader');

            if (!url) return alert("Bhai link toh dalo!");

            card.style.display = 'none';
            loader.style.display = 'block';

            try {
                let api = "";
                // Logic based on URL
                if (url.includes('youtube') || url.includes('youtu.be')) {
                    api = `https://raza-api-taupe.vercel.app/download/ytdl?url=${encodeURIComponent(url)}`;
                } else if (url.includes('instagram.com')) {
                    api = `https://api.princetechn.com/api/download/instadl?apikey=prince&url=${encodeURIComponent(url)}`;
                } else {
                    api = `https://ahmad-rdx-api-7x1p.onrender.com/downloader/aiodl?apikey=AhmadRDX&url=${encodeURIComponent(url)}`;
                }

                const res = await axios.get(api);
                const data = res.data;

                // Processing Response
                if (url.includes('youtube')) {
                    currentData.mp4 = data.result.mp4;
                    currentData.mp3 = data.result.mp3;
                    currentData.title = data.result.title;
                    document.getElementById('video-thumb').src = `https://img.youtube.com/vi/${url.split('v=')[1]?.split('&')[0]}/mqdefault.jpg`;
                } else if (url.includes('instagram')) {
                    currentData.mp4 = data.result.download_url;
                    currentData.mp3 = data.result.download_url;
                    currentData.title = "Instagram Reel";
                    document.getElementById('video-thumb').src = data.result.thumbnail;
                } else {
                    const r = data.result;
                    currentData.mp4 = r.links.video[0].url;
                    currentData.mp3 = r.links.video[0].url;
                    currentData.title = r.title || "Social Video";
                    document.getElementById('video-thumb').src = r.thumbnail;
                }

                document.getElementById('v-title').innerText = currentData.title;
                loader.style.display = 'none';
                card.style.display = 'block';

            } catch (e) {
                loader.style.display = 'none';
                alert("API Error! Please check your connection or link.");
            }
        }

        // Direct Download Function (Blob Method)
        async function directDownload(quality) {
            const fileUrl = quality.includes('mp3') ? currentData.mp3 : currentData.mp4;
            const fileName = currentData.title.substring(0,20) + "_" + quality + (quality.includes('mp3') ? ".mp3" : ".mp4");

            alert("📥 Downloading Started! Please wait...");

            try {
                const response = await fetch(fileUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                // Fallback if blob fails
                window.open(fileUrl, '_blank');
            }
        }
    </script>
