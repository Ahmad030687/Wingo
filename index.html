<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD ALI - Premium Video Downloader</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #996515;
            --black: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            background: rgba(0,0,0,0.8);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .brand-name {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold);
            margin: 0;
        }

        .container {
            max-width: 900px;
            width: 95%;
            margin: 40px auto;
            text-align: center;
        }

        .search-box {
            position: relative;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 80%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid var(--gold);
            background: var(--black);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        input[type="text"]:focus {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
        }

        .btn-search {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(45deg, var(--gold), var(--dark-gold));
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin-left: -60px;
            transition: 0.3s;
        }

        .btn-search:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--gold);
        }

        /* Result Card Area */
        #resultArea {
            display: none;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .thumbnail {
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            border: 2px solid var(--gold);
            margin-bottom: 15px;
        }

        .video-title {
            color: var(--gold);
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* Split Section */
        .download-options {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 20px;
        }

        .download-options::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 10%;
            bottom: 10%;
            width: 2px;
            background: white;
        }

        .side {
            width: 45%;
        }

        .side h4 { color: var(--gold); margin-bottom: 15px; }

        .dl-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-video { background: var(--gold); color: black; }
        .btn-audio { border: 1px solid var(--gold); color: var(--gold); }

        .dl-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Floating WhatsApp */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }

        footer {
            margin-top: auto;
            width: 100%;
            padding: 20px;
            text-align: center;
            color: var(--gold);
            font-weight: bold;
            background: rgba(0,0,0,0.5);
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1 class="brand-name">AHMAD ALI</h1>
    </header>

    <div class="container">
        <h2 style="color: #fff; text-shadow: 2px 2px 4px #000;">Premium All-in-One Downloader</h2>
        <p style="color: #ccc;">Download High Quality Videos & Music Instantly</p>

        <div class="search-box">
            <input type="text" id="videoUrl" placeholder="Paste video link here (YouTube, FB, TikTok, Insta...)" />
            <button class="btn-search" onclick="fetchVideo()">
                <i class="fas fa-download"></i> DOWNLOAD
            </button>
        </div>

        <div id="loader" class="loader"></div>

        <div id="resultArea">
            <img id="thumb" class="thumbnail" src="" alt="Thumbnail">
            <div id="title" class="video-title">Video Title Goes Here</div>
            
            <div class="download-options">
                <div class="side">
                    <h4><i class="fas fa-music"></i> AUDIO (MP3)</h4>
                    <div id="audioLinks">
                        </div>
                </div>

                <div class="side">
                    <h4><i class="fas fa-video"></i> VIDEO (MP4)</h4>
                    <div id="videoLinks">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <a href="https://wa.me/923068796622" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer>
        &copy; 2026 Designed by AHMAD ALI | Professional Premium Experience
    </footer>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('videoUrl').value;
            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('resultArea');
            const audioBox = document.getElementById('audioLinks');
            const videoBox = document.getElementById('videoLinks');

            if (!url) {
                alert("Please paste a URL first!");
                return;
            }

            // Reset UI
            loader.style.display = 'block';
            resultArea.style.display = 'none';
            audioBox.innerHTML = '';
            videoBox.innerHTML = '';

            try {
                let response;
                let data;

                // API Logic Selection
                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    response = await axios.get(`https://raza-api-taupe.vercel.app/download/ytdl?url=${encodeURIComponent(url)}`);
                    data = response.data.result;
                    
                    document.getElementById('thumb').src = "https://img.youtube.com/vi/" + url.split('v=')[1]?.split('&')[0] + "/hqdefault.jpg";
                    document.getElementById('title').innerText = data.title;
                    
                    // Add Audio
                    audioBox.innerHTML = `<a href="${data.mp3}" class="dl-btn btn-audio" target="_blank">Download MP3 (High)</a>`;
                    // Add Video
                    videoBox.innerHTML = `<a href="${data.mp4}" class="dl-btn btn-video" target="_blank">Download MP4 (720p/1080p)</a>`;

                } else if (url.includes('instagram.com')) {
                    response = await axios.get(`https://api.princetechn.com/api/download/instadl?apikey=prince&url=${encodeURIComponent(url)}`);
                    data = response.data.result;
                    
                    document.getElementById('thumb').src = data.thumbnail;
                    document.getElementById('title').innerText = "Instagram Video";
                    videoBox.innerHTML = `<a href="${data.download_url}" class="dl-btn btn-video" target="_blank">Download MP4 (HD)</a>`;
                    audioBox.innerHTML = `<p style='font-size:0.8rem; color:gray;'>Audio not available for Insta</p>`;

                } else {
                    // Universal API for FB, TikTok, Snapchat
                    response = await axios.get(`https://ahmad-rdx-api-7x1p.onrender.com/downloader/aiodl?apikey=AhmadRDX&url=${encodeURIComponent(url)}`);
                    data = response.data.result;
                    
                    document.getElementById('thumb').src = data.thumbnail || 'https://via.placeholder.com/400x200?text=Premium+Video';
                    document.getElementById('title').innerText = data.title || "Social Media Video";
                    
                    // Loop through video links
                    if(data.links && data.links.video){
                        data.links.video.forEach(vid => {
                            videoBox.innerHTML += `<a href="${vid.url}" class="dl-btn btn-video" target="_blank">Download ${vid.resolution || 'MP4'}</a>`;
                        });
                    } else {
                        videoBox.innerHTML = `<a href="${data.url}" class="dl-btn btn-video" target="_blank">Download Video</a>`;
                    }
                    audioBox.innerHTML = `<p style='font-size:0.8rem; color:gray;'>Extracting MP3...</p>`;
                }

                loader.style.display = 'none';
                resultArea.style.display = 'block';

            } catch (error) {
                console.error(error);
                alert("Error: API down or link invalid. Please try again.");
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
